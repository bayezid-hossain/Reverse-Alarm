name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Node Dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.jks

      - name: Inject Gradle Signing Config
        run: |
          node << 'EOF'
          const fs = require('fs');
          const gradlePath = 'android/app/build.gradle';
          let content = fs.readFileSync(gradlePath, 'utf8');

          const signingBlock = [
            '    signingConfigs {',
            '        release {',
            "            storeFile file('release.jks')",
            "            storePassword System.getenv('KEYSTORE_PASSWORD')",
            "            keyAlias System.getenv('KEYSTORE_ALIAS')",
            "            keyPassword System.getenv('KEY_PASSWORD')",
            '        }',
            '    }'
          ].join('\n');

          // Insert signingConfigs block before buildTypes
          content = content.replace(
            /(\s*buildTypes\s*\{)/,
            '\n' + signingBlock + '\n$1'
          );

          // Wire release buildType to the signingConfig
          content = content.replace(
            /(buildTypes\s*\{[^}]*release\s*\{)/,
            '$1\n            signingConfig signingConfigs.release'
          );

          fs.writeFileSync(gradlePath, content);
          console.log('Signing config injected.');
          EOF

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      - name: Build APK + AAB Release
        env:
          EXPO_PUBLIC_API_MODE: production
          NODE_ENV: production
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: cd android && ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Extract Release Notes
        id: release_notes
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.GITHUB_REF_NAME;
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const escapeRegex = (s) => s.replace(/[-\/\\\\^\$*+?.()|[\]{}]/g, '\\\\\$&');
            const match = changelog.match(new RegExp('## \\\[' + escapeRegex(version) + '\\\].*?\\\\n([\\\\s\\\\S]*?)(?=\\\\n## |\$)', 'i'));
            let notes = match ? match[1].trim() : 'Bug fixes and performance improvements.';
            fs.writeFileSync('RELEASE_NOTES.txt', notes);
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
