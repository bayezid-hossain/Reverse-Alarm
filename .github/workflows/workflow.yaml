name: Release APK

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v1.0.0, v2.1.3, etc.

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Node Dependencies
        run: npm install

      - name: Expo Prebuild (Android)
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      - name: Build APK Release
        env:
          NODE_ENV: production
        run: cd android && ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Extract Release Notes
        id: release_notes
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.GITHUB_REF_NAME;
            if (!fs.existsSync('CHANGELOG.md')) {
              fs.writeFileSync('RELEASE_NOTES.txt', 'Bug fixes and performance improvements.');
              process.exit(0);
            }
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const escapeRegex = (s) => s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\\\$&');
            const match = changelog.match(new RegExp('## \\\[' + escapeRegex(version) + '\\\].*?\\n([\\\\s\\\\S]*?)(?=\\n## |$)', 'i'));
            let notes = match ? match[1].trim() : 'Bug fixes and performance improvements.';
            fs.writeFileSync('RELEASE_NOTES.txt', notes);
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          name: Release ${{ github.ref_name }}
          body_path: RELEASE_NOTES.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
