<span class="material-symbols-outlined text-[#fe5e1e]" data-icon="sensors">sensors</span>
<span class="font-['Space_Grotesk'] uppercase tracking-tighter font-bold text-[#fe5e1e]">SYSTEM ARMED</span>
</div>
<div class="text-2xl font-black text-[#fe5e1e] tracking-widest font-['Space_Grotesk']">06:30</div>
</header>
<main class="flex flex-col items-center justify-center min-h-screen px-6 pt-16 pb-24 relative">

<div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
<div class="h-full w-full bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary via-background to-background"></div>
</div>
<!-- High Intensity Status Indicator -->
<div class="z-10 w-full max-w-md flex flex-col items-center gap-8">
<div class="bg-secondary text-on-secondary-fixed px-4 py-1 headline-font font-black uppercase text-sm tracking-widest mb-4">

            </div>

<div class="flex flex-col items-center">

                    06:30
                </h1>
<div class="flex gap-2 items-center text-primary mt-2">

</div>
</div>

<div class="w-full bg-surface-container-low border-l-4 border-secondary p-8 mt-4 relative overflow-hidden">

<div class="absolute top-0 right-0 p-2 opacity-20">
<span class="material-symbols-outlined text-6xl" data-icon="directions_walk">directions_walk</span>
</div>
<h2 class="headline-font font-bold text-on-surface-variant uppercase text-xs tracking-widest mb-2">REQUIRED MISSION</h2>
<p class="headline-font font-extrabold text-3xl text-on-background uppercase leading-tight">

<div class="flex-1 bg-surface-container-highest"></div>
<div class="flex-1 bg-surface-container-highest"></div>
<div class="flex-1 bg-surface-container-highest"></div>
<div class="flex-1 bg-surface-container-highest"></div>

<button class="anodic-gradient w-full py-6 headline-font font-black text-on-primary-fixed text-xl uppercase tracking-widest active:scale-95 transition-transform duration-150 alarm-glow">
                    START MISSION
                </button>
<div class="flex justify-center items-center gap-4 text-outline-variant uppercase headline-font font-bold text-[10px] tracking-widest">
<span>SECURITY OVERRIDE LOCKED</span>
<span class="h-1 w-1 bg-outline-variant rounded-full"></span>
<span>EXTERNAL SENSORS ACTIVE</span>

</div>
